{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup and responsive meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title block for dynamic titles -->
    <title>
        {% block title %}
            Sticky Notes
        {% endblock %}
    </title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="{% static 'notes/styles.css' %}">
</head>
<body>

    <!-- Header section -->
    <header>
        <h1>
            {% block header %}
                Sticky Notes
            {% endblock %}
        </h1>
    </header>

    <!-- Main content area (changes per page) -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer section -->
    <footer>
        Sticky Notes App
    </footer>

</body>
</html>
